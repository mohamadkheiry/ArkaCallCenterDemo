; ============================================================================
; Arka Call Center — نمونه dialplan برای پاسخ‌گویی هوشمند
; این فایل را در /etc/asterisk/extensions_custom.conf وارد (include) کنید یا
; در FreePBX از «Custom Destinations / Custom Extensions» استفاده کنید.
;
; منطق: تماس ورودی به داخلی کاربر → Answer → اتصال به AudioSocket ورکر آرکا.
; UUID را طوری می‌سازیم که ۱۲ رقم آخر آن، شماره‌ی داخلیِ صفرپرشده (اعشاری) باشد؛
; ورکر از همین UUID شماره‌ی داخلی را استخراج می‌کند.
;   مثال: داخلی 1005 → UUID = 00000000-0000-0000-0000-000000001005
; ============================================================================

[arka-ai]
; ${EXTEN} همان شماره داخلی (۱۰۰۰ تا ۹۹۹۹) است.
exten => _X.,1,NoOp(Arka AI answering extension ${EXTEN})
 same => n,Answer()
 ; شماره‌ی داخلی را تا ۱۲ رقم صفرپر می‌کنیم و در انتهای UUID می‌گذاریم.
 same => n,Set(ARKA_PADDED=000000000000${EXTEN})
 same => n,Set(ARKA_TAIL=${ARKA_PADDED:-12})
 same => n,Set(ARKA_UUID=00000000-0000-0000-0000-${ARKA_TAIL})
 same => n,AudioSocket(${ARKA_UUID},ARKA_WORKER_HOST:9092)
 same => n,Hangup()

; نکته: مقدار ARKA_WORKER_HOST را با IP سروری که ArkaCallCenter.Realtime روی آن
; اجرا می‌شود جایگزین کنید. پورت پیش‌فرض AudioSocket = 9092 (قابل تغییر در appsettings).
;
; پیش‌نیاز: ماژول app_audiosocket در استریسک بارگذاری شده باشد (Asterisk >= 16).
; بررسی: asterisk -rx "module show like audiosocket"
