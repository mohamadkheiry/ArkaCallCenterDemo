; ============================================================================
; Arka Call Center — dialplan (پذیرش هوشمند + پاسخ‌گویی AI)
; محل قرارگیری: /etc/asterisk/extensions_custom.conf  (یا include از آن)
; پس از تغییر: asterisk -rx "dialplan reload"
;
; متغیر ARKA_WORKER_HOST را برابر IP سروری که ArkaCallCenter.Realtime روی آن
; اجرا می‌شود قرار دهید (پورت پیش‌فرض AudioSocket = 9092).
; ============================================================================

[globals]
ARKA_WORKER_HOST=192.168.10.175      ; ← IP سرور ورکر آرکا
ARKA_WORKER_PORT=9092

; ----------------------------------------------------------------------------
; [arka-main] : پذیرش اصلی شرکت (IVR)
; تماس ورودی به شماره‌ی اصلی → پخش پیام پذیرش (آپلودشده از پنل سوپرادمین) →
; دریافت شماره داخلی از کاربر → شروع سناریوی همان داخلی.
; اینباند روت/DID را به این context (اکستنشن s) هدایت کنید.
; ----------------------------------------------------------------------------
[arka-main]
exten => s,1,NoOp(Arka main reception)
 same => n,Answer()
 same => n,Wait(1)
 same => n,Set(TIMEOUT(digit)=5)
 ; پیام پذیرش را پخش و همزمان تا ۴ رقم داخلی را می‌گیرد (barge-in مجاز).
 ; ۳ = حداکثر تلاش، ۷ = تایم‌اوت ثانیه.
 same => n(get),Read(ARKA_EXT,arka/main-greeting,4,,3,7)
 same => n,GotoIf($["${ARKA_EXT}" = ""]?invalid)
 ; اعتبارسنجی بازه (۱ تا ۹۹۹۹)
 same => n,GotoIf($[${ARKA_EXT} >= 1 & ${ARKA_EXT} <= 9999]?connect:invalid)
 same => n(connect),Goto(arka-ai,${ARKA_EXT},1)
 same => n(invalid),Playback(pbx-invalid)
 same => n,Goto(get)

; ----------------------------------------------------------------------------
; [arka-ai] : پاسخ‌گویی هوش مصنوعی برای یک داخلی مشخص
; ۱۲ رقم آخرِ UUID = شماره‌ی داخلیِ صفرپرشده (ورکر با آن داخلی را تشخیص می‌دهد).
; ۲۰ رقم اولِ UUID = شماره‌ی تماس‌گیرنده‌ی صفرپرشده (ورکر آن را برای CallerId می‌خواند).
; ----------------------------------------------------------------------------
[arka-ai]
exten => _X.,1,NoOp(Arka AI answering extension ${EXTEN} caller ${CALLERID(num)})
 same => n,Answer()
 same => n,Set(ARKA_CALL=${FILTER(0-9,${CALLERID(num)})})
 same => n,Set(ARKA_CALL=00000000000000000000${ARKA_CALL})
 same => n,Set(ARKA_CALL=${ARKA_CALL:-20})
 same => n,Set(ARKA_PADDED=000000000000${EXTEN})
 same => n,Set(ARKA_TAIL=${ARKA_PADDED:-12})
 same => n,Set(ARKA_UUID=${ARKA_CALL:0:8}-${ARKA_CALL:8:4}-${ARKA_CALL:12:4}-${ARKA_CALL:16:4}-${ARKA_TAIL})
 same => n,AudioSocket(${ARKA_UUID},${ARKA_WORKER_HOST}:${ARKA_WORKER_PORT})
 same => n,Hangup()

; ----------------------------------------------------------------------------
; اتصال به شماره‌گیری داخلی FreePBX:
;  • 9000  → پذیرش (IVR): صوت پذیرش پخش و سپس منتظر دریافت داخلی می‌ماند.
;  • ۱۰۰۰–۹۹۹۹ → شماره‌گیریِ مستقیمِ داخلیِ AI (اگر داخلیِ واقعی نباشد).
;
; امن در برابر تداخل: الگوی ۴رقمی «_[1-9]XXX» اول با DB_EXISTS چک می‌کند آیا آن
; شماره یک داخلیِ واقعیِ ایزابل است (در astdb: DEVICE/<ext>/dial). اگر واقعی بود
; به ext-local (رفتار عادیِ ایزابل) می‌رود؛ فقط اگر واقعی نبود به آرکا می‌رود.
; پس اگر بعداً یک داخلی/IVR واقعیِ ۴رقمی بسازید، آرکا آن را نمی‌قاپد. داخلی‌های
; ۳رقمی (مثل 100/101) اصلاً با این الگو match نمی‌شوند. از «include => arka-ai»
; استفاده نشده چون با _X. بیش از حد گسترده بود و تداخل ایجاد می‌کرد.
; ----------------------------------------------------------------------------
[from-internal-custom]
exten => 9000,1,Goto(arka-main,s,1)
exten => _[1-9]XXX,1,GotoIf($["${DB_EXISTS(DEVICE/${EXTEN}/dial)}"="1"]?realext)
 same => n,Goto(arka-ai,${EXTEN},1)
 same => n(realext),Goto(ext-local,${EXTEN},1)
