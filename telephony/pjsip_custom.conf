; ============================================================================
; Arka Call Center — نمونه‌ی PJSIP (اختیاری)
; محل: /etc/asterisk/pjsip_custom.conf  →  asterisk -rx "pjsip reload"
;
; در مدل «تلفن هوشمند»، پاسخ‌گویی توسط dialplan (AudioSocket) انجام می‌شود و
; داخلی‌های AI لزوماً نیازی به endpoint فیزیکی ندارند. این فایل زمانی لازم است
; که بخواهید یک دستگاه واقعی هم روی داخلی رجیستر شود. سرویس provisioning آرکا
; بلوک‌های زیر را به‌صورت خودکار برای هر داخلی اضافه می‌کند.
; ============================================================================

; ترنسپورت UDP (اگر از قبل تعریف نشده)
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

; نمونه‌ی یک داخلی (به‌صورت خودکار توسط provisioning ساخته می‌شود):
;[1005]
;type=endpoint
;transport=transport-udp
;context=arka-ai
;disallow=all
;allow=ulaw
;allow=alaw
;auth=1005-auth
;aors=1005
;
;[1005-auth]
;type=auth
;auth_type=userpass
;username=1005
;password=<generated-secret>
;
;[1005]
;type=aor
;max_contacts=1
